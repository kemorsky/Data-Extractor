name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore
        run: dotnet restore DataExtractor/DataExtractor.csproj    
      
      - name: Build
        run: dotnet build DataExtractor/DataExtractor.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: Publish backend
        run: dotnet publish DataExtractor/DataExtractor.csproj -c Release -o publish  


        
          
